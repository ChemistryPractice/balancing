<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Equation Balancer</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/bundle/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
        }

        /* Sidebar Styling */
        #sidebar {
            width: 250px;
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        #sidebar h2 {
            font-size: 1.2rem;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .side-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
            transition: background 0.3s;
        }

        .side-btn:hover {
            background: var(--accent-color);
        }

        .side-btn.active {
            background: var(--accent-color);
            font-weight: bold;
        }

        /* Main Content Styling */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        #reaction-type {
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        #display-area {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 20px 0;
            padding: 20px;
            border: 1px dashed #ccc;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #gen-btn { background: #27ae60; color: white; }
        #check-btn { background: #e67e22; color: white; }
        .action-btn:active { transform: scale(0.98); }

        #answer-reveal {
            margin-top: 25px;
            padding: 20px;
            background: #e8f4fd;
            border-radius: 8px;
            display: none;
            font-size: 1.5rem;
        }

        /* Periodic Table Overlay */
        #pt-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        #pt-container {
            width: 90%;
            height: 90%;
            background: white;
            position: relative;
        }

        #close-pt {
            position: absolute;
            top: 10px; right: 10px;
            padding: 10px;
            cursor: pointer;
            background: #c0392b;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Practice Mode</h2>
    <button class="side-btn active" onclick="setMode('formula', this)">Formula Equations</button>
    <button class="side-btn" onclick="setMode('word', this)">Word Equations</button>
    
    <div style="margin-top: auto;">
        <button class="side-btn" onclick="togglePT(true)">Periodic Table</button>
    </div>
</div>

<div id="main-content">
    <div class="container">
        <div id="reaction-type">Select "New Equation" to Start</div>
        <div id="display-area">
            Click the button below to generate a reaction.
        </div>

        <div class="controls">
            <button id="gen-btn" class="action-btn" onclick="generateNew()">New Equation</button>
            <button id="check-btn" class="action-btn" onclick="revealAnswer()">Check Answer</button>
        </div>

        <div id="answer-reveal">
            <strong>Balanced Equation:</strong>
            <div id="balanced-formula"></div>
        </div>
    </div>
</div>

<div id="pt-overlay">
    <div id="pt-container">
        <button id="close-pt" onclick="togglePT(false)">Close [X]</button>
        <iframe src="https://www.ptable.com/?embed" width="100%" height="100%" frameborder="0"></iframe>
    </div>
</div>

        { type: "Combustion", word: "Octane + Oxygen → Carbon Dioxide + Water", formula: "C_8H_{18} + O_2 \\rightarrow CO_2 + H_2O", balanced: "2C_8H_{18} + 25O_2 \\rightarrow 16CO_2 + 18H_2O" },
        { type: "Combustion", word: "Methanol + Oxygen → Carbon Dioxide + Water", formula: "CH_3OH + O_2 \\rightarrow CO_2 + H_2O", balanced: "2CH_3OH + 3O_2 \\rightarrow 2CO_2 + 4H_2O" },
        { type: "Combustion", word: "Ethanol + Oxygen → Carbon Dioxide + Water", formula: "C_2H_5OH + O_2 \\rightarrow CO_2 + H_2O", balanced: "C_2H_5OH + 3O_2 \\rightarrow 2CO_2 + 3H_2O" },
        { type: "Combustion", word: "Glucose + Oxygen → Carbon Dioxide + Water", formula: "C_6H_{12}O_6 + O_2 \\rightarrow CO_2 + H_2O", balanced: "C_6H_{12}O_6 + 6O_2 \\rightarrow 6CO_2 + 6H_2O" },
        { type: "Combustion", word: "Acetylene + Oxygen → Carbon Dioxide + Water", formula: "C_2H_2 + O_2 \\rightarrow CO_2 + H_2O", balanced: "2C_2H_2 + 5O_2 \\rightarrow 4CO_2 + 2H_2O" },
        { type: "Combustion", word: "Benzene + Oxygen → Carbon Dioxide + Water", formula: "C_6H_6 + O_2 \\rightarrow CO_2 + H_2O", balanced: "2C_6H_6 + 15O_2 \\rightarrow 12CO_2 + 6H_2O" },
        { type: "Combustion", word: "Ethene + Oxygen → Carbon Dioxide + Water", formula: "C_2H_4 + O_2 \\rightarrow CO_2 + H_2O", balanced: "C_2H_4 + 3O_2 \\rightarrow 2CO_2 + 2H_2O" },
        { type: "Combustion", word: "Isopropyl Alcohol + Oxygen → Carbon Dioxide + Water", formula: "C_3H_7OH + O_2 \\rightarrow CO_2 + H_2O", balanced: "2C_3H_7OH + 9O_2 \\rightarrow 6CO_2 + 8H_2O" },
        { type: "Combustion", word: "Heptane + Oxygen → Carbon Dioxide + Water", formula: "C_7H_{16} + O_2 \\rightarrow CO_2 + H_2O", balanced: "C_7H_{16} + 11O_2 \\rightarrow 7CO_2 + 8H_2O" },
        { type: "Combustion", word: "Magnesium + Oxygen → Magnesium Oxide", formula: "Mg + O_2 \\rightarrow MgO", balanced: "2Mg + O_2 \\rightarrow 2MgO" },
        { type: "Combustion", word: "Sulfur + Oxygen → Sulfur Dioxide", formula: "S + O_2 \\rightarrow SO_2", balanced: "S + O_2 \\rightarrow SO_2" },
        { type: "Combustion", word: "Carbon + Oxygen → Carbon Dioxide", formula: "C + O_2 \\rightarrow CO_2", balanced: "C + O_2 \\rightarrow CO_2" },
        { type: "Combustion", word: "Hydrogen + Oxygen → Water", formula: "H_2 + O_2 \\rightarrow H_2O", balanced: "2H_2 + O_2 \\rightarrow 2H_2O" },
        { type: "Combustion", word: "Iron + Oxygen → Iron(III) Oxide", formula: "Fe + O_2 \\rightarrow Fe_2O_3", balanced: "4Fe + 3O_2 \\rightarrow 2Fe_2O_3" }
    ];

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(currentEquation) displayCurrent();
    }

    function generateNew() {
        const randomIndex = Math.floor(Math.random() * equationBank.length);
        currentEquation = equationBank[randomIndex];
        document.getElementById('answer-reveal').style.display = 'none';
        displayCurrent();
    }

    function displayCurrent() {
        const display = document.getElementById('display-area');
        const typeLabel = document.getElementById('reaction-type');
        
        typeLabel.innerText = "Type: " + currentEquation.type;
        
        if (currentMode === 'word') {
            display.innerHTML = currentEquation.word;
        } else {
            display.innerHTML = `$$${currentEquation.formula}$$`;
            MathJax.typeset();
        }
    }

    function revealAnswer() {
        if(!currentEquation) return;
        const revealDiv = document.getElementById('answer-reveal');
        const balancedDiv = document.getElementById('balanced-formula');
        
        revealDiv.style.display = 'block';
        balancedDiv.innerHTML = `$$${currentEquation.balanced}$$`;
        MathJax.typeset();
    }

    function togglePT(show) {
        document.getElementById('pt-overlay').style.display = show ? 'flex' : 'none';
    }
</script>

</body>
</html>
